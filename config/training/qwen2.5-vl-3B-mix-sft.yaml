
name: qwen2.5-vl-3B-nusc-sft
description: AutoVLA based on Qwen 2.5 VL 3B model fine-tuned on NuPlan dataset with action only

# model
model:
  use_cot: true
  pretrained_model_path: ./Qwen2.5-VL-3B-Instruct
  train_vision_backbone: false
  train_lm_backbone: true
  codebook_cache_path: "codebook_cache/agent_vocab.pkl"
  trajectory: # future trajectory parameters
    num_poses: 10
    interval_length: 0.5
    time_horizon: 5.0
  tokens: # action token parameters, depends on the pretrained large model
    action_start_id: 151665
    ignore_index: -100
    assistant_id: [151644, 77091]
    precision: mixed
  video:
    min_pixels: 8192
    max_pixels: 12288

# training
training:
  batch_size: 1
  learning_rate: 5.0e-6
  epochs: 5
  num_workers: 8
  weight_decay: 0.01
  lr_warmup_step: 500
  lr_step_frequency: 2000
  lr_step_gamma: 0.98
  train_sample_size: 5000
  accumulate_grad_batches: 1
  gradient_clip_val: 0.001
  sampling_mode: random

data:
  train:
      json_dataset_path: /work/amd456/autovla/data/nuscenes_processed/train
      sensor_data_path: /work/amd456/autovla/dataset/nuscenes

  val:
      json_dataset_path: /work/amd456/autovla/data/nuscenes_processed/val
      sensor_data_path: /work/amd456/autovla/dataset/nuscenes


inference:
  batch_size: 1
  num_workers: 2
  sample:
    max_length: 2048
    temperature: 0.8
    top_k: 20
    top_p: 0.2